language = "C"
include_guard = "MOBILE_AI_RUNTIME_H"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen. Do not edit manually. */"
include_version = true
sys_includes = ["stdbool.h", "stdint.h", "stddef.h"]

[parse]
parse_deps = false

[export]
include = [
  "RuntimeHandle",
  "TokenCallback",
  "mai_runtime_init",
  "mai_runtime_destroy",
  "mai_load_model",
  "mai_unload_model",
  "mai_chat_completion",
  "mai_cancel_completion",
  "mai_download_start",
  "mai_download_status_json",
  "mai_download_list_json",
  "mai_download_retry",
  "mai_download_cancel",
  "mai_download_delete",
  "mai_metrics_json",
  "mai_model_catalog_json",
  "mai_hub_search_models_json",
  "mai_device_profile_json",
  "mai_last_error_message",
  "mai_free_string",
]

[fn]
prefix = "MAI_API"

[defines]
"target_os = ios" = "MAI_IOS"
